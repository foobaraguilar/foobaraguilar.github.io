<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="post-label" content="TRAVEL" />
    <title>Northern Chile and Patagonia</title>
    <link rel="icon" id="site-favicon" href="../assets/favicon.png" type="image/png" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="post-detail">
    <div class="page">
      <div class="post-detail-chrome-row">
        <div class="post-detail-breadcrumb-row">
          <a href="../index.html" class="breadcrumb-link">← Back to Home</a>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
        </button>
      </div>
      <header class="simple-header">
        <div class="post-detail-header-inner">
          <p class="post-detail-kicker">Travel</p>
          <h1 class="intro-greeting">Northern Chile and Patagonia, 18 liters</h1>
          <p class="intro-subtext">
            Coming April 18th
          </p>
          <time class="post-detail-date" datetime="2024-12-01"> April 18th, 2026</time>
        </div>
      </header>

      <main class="post-detail-main fade-in">
        <div class="post-detail-hero">
          <img class="post-detail-hero-img" src="images/3.jpg" alt="" />
          <p class="post-detail-hero-caption">2am bus stop with Luke</p>
        </div>
        <article class="post-detail-body">
          <p>
             


          </p>
        </article>
        <footer class="post-detail-engagement" aria-label="Reactions and comments">
          <div class="post-detail-likes">
            <button
              type="button"
              class="post-detail-like-btn"
              id="post-like-btn"
              aria-label="Like this post"
              aria-pressed="false"
            >
              <span class="post-detail-likes-icon" aria-hidden="true">♥</span>
              <span class="post-detail-likes-count" id="post-likes-count">0</span>
            </button>
            <span class="post-detail-likes-note">likes</span>
          </div>
          <section class="post-detail-comments">
            <h2 class="post-detail-comments-heading">Comments</h2>
            <form class="post-detail-comment-form" id="post-comment-form">
              <label for="post-comment-input" class="visually-hidden">Add a comment</label>
              <textarea
                id="post-comment-input"
                name="comment"
                rows="3"
                maxlength="2000"
                placeholder="Write a comment…"
                required
              ></textarea>
              <button type="submit">Post comment</button>
            </form>
            <ul class="post-detail-comment-list" id="post-comment-list" aria-live="polite"></ul>
            <p class="post-detail-comments-empty" id="post-comment-empty">No comments yet.</p>
          </section>
        </footer>
      </main>
    </div>

    <script>
      (function () {
        var body = document.body;
        var toggle = document.getElementById('theme-toggle');
        if (!toggle) return;

        var favicon = document.getElementById('site-favicon');

        function setFavicon() {
          if (!favicon) return;
          favicon.setAttribute('href', '../assets/favicon.png');
        }

        function applyTheme(theme) {
          var isDark = theme === 'dark';
          body.classList.toggle('theme-dark', isDark);
          var root = document.documentElement;
          root.classList.toggle('theme-dark', isDark);
          setFavicon();
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        var stored = localStorage.getItem('theme');
        if (stored === 'dark') {
          applyTheme('dark');
        } else {
          applyTheme('light');
        }

        toggle.addEventListener('click', function () {
          var next = body.classList.contains('theme-dark') ? 'light' : 'dark';
          applyTheme(next);
        });
      })();
    </script>
    <script src="../assets/post-interactions.js" defer></script>
  </body>
</html>
