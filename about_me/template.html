<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Me — [Caption or title]</title>
    <link rel="icon" id="site-favicon" href="../assets/favicon.png" type="image/png" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="page">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <span class="theme-toggle-icon" aria-hidden="true"></span>
      </button>
      <header class="simple-header">
        <a href="../index.html" class="breadcrumb-link">← Back to Home</a>
      </header>

      <main class="about-me-photo-main fade-in">
        <figure class="about-me-photo">
          <img src="IMAGE_URL_HERE" alt="Caption or short description" class="about-me-photo-img" />
          <figcaption class="about-me-photo-caption">Caption describing the image and what it means to you.</figcaption>
        </figure>
      </main>
    </div>

    <script>
      (function () {
        var body = document.body;
        var toggle = document.getElementById('theme-toggle');
        if (!toggle) return;

        var favicon = document.getElementById('site-favicon');

        function setFavicon() {
          if (!favicon) return;
          favicon.setAttribute('href', '../assets/favicon.png');
        }
        function applyTheme(theme) {
          var isDark = theme === 'dark';
          body.classList.toggle('theme-dark', isDark);
          var root = document.documentElement;
          root.classList.toggle('theme-dark', isDark);
          setFavicon();
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        var stored = localStorage.getItem('theme');
        if (stored === 'dark' || stored === 'light') applyTheme(stored);
        toggle.addEventListener('click', function () {
          applyTheme(body.classList.contains('theme-dark') ? 'light' : 'dark');
        });
      })();
    </script>
  </body>
</html>
