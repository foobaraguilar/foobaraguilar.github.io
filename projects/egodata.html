<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sensor Depth and Scale: Rethinking Granularity</title>
    <link rel="icon" id="site-favicon" href="../assets/favicon.png" type="image/png" />
    <link rel="stylesheet" href="../style.css" />
    <style>
      .passcode-gate {
        max-width: 360px;
        margin: 1.25rem auto 0;
        padding: 1.25rem 1.25rem 1.1rem;
        border: 1px solid #e3e3e3;
        border-radius: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
      }
      .passcode-gate h2 {
        margin: 0 0 0.4rem;
        font-size: 1.08rem;
        letter-spacing: 0.01em;
      }
      .passcode-gate p {
        margin: 0 0 0.9rem;
        color: #666;
        font-size: 0.95rem;
        line-height: 1.45;
      }
      .passcode-gate-form {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        align-items: stretch;
      }
      .passcode-gate-form input {
        width: 100%;
        margin: 0;
        padding: 10px 12px;
        font: inherit;
        font-size: 14px;
        line-height: 1.4;
        color: #333;
        background: #fff;
        border: 1px solid #d7d7d7;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .passcode-gate-form input:focus {
        outline: none;
        border-color: #999;
      }
      .passcode-gate-form button[type='submit'] {
        width: 100%;
        padding: 8px 16px;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #fff;
        background: #333;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        white-space: nowrap;
      }
      .passcode-gate-form button[type='submit']:hover {
        background: #222;
      }
      .passcode-gate-error {
        margin-top: 0.65rem;
        min-height: 1.2em;
        color: #c0392b;
        font-size: 0.88rem;
      }
      body.theme-dark .passcode-gate {
        border-color: #333;
        background: linear-gradient(180deg, #171717 0%, #131313 100%);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      body.theme-dark .passcode-gate h2 {
        color: #f2f2f2;
      }
      body.theme-dark .passcode-gate p {
        color: #a6a6a6;
      }
      body.theme-dark .passcode-gate-form input {
        color: #f0f0f0;
        background: #1a1a1a;
        border-color: #444;
      }
      body.theme-dark .passcode-gate-form input:focus {
        border-color: #666;
      }
      body.theme-dark .passcode-gate-form button[type='submit'] {
        background: #e5e5e5;
        color: #111;
      }
      body.theme-dark .passcode-gate-form button[type='submit']:hover {
        background: #fff;
      }
      body.theme-dark .passcode-gate-error {
        color: #ff8a80;
      }
      @media (max-width: 560px) {
        .passcode-gate {
          max-width: 92%;
        }
      }
    </style>
  </head>
  <body class="post-detail">
    <div class="page">
      <div class="post-detail-chrome-row">
        <div class="post-detail-breadcrumb-row">
          <a href="../index.html" class="breadcrumb-link">← Back to Home</a>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
        </button>
      </div>
      <header class="simple-header">
        <div class="post-detail-header-inner">
          <p class="post-detail-kicker">Research</p>
          <h1 class="intro-greeting">Sensor Depth and Scale: Rethinking Granularity</h1>
          <p class="intro-subtext">My perspective on hierarchical phase segmentation depth</p>
          <time class="post-detail-date" datetime="2025-03-01">April 12th, 2026</time>
        </div>
      </header>

      <section class="passcode-gate" id="passcode-gate">
        <h2>Passcode</h2>
        <form class="passcode-gate-form" id="passcode-gate-form">
          <input
            id="passcode-input"
            name="passcode"
            type="password"
            inputmode="numeric"
            maxlength="4"
            autocomplete="off"
            placeholder="1234"
            required
          />
          <button type="submit">Unlock</button>
        </form>
        <p class="passcode-gate-error" id="passcode-gate-error" aria-live="polite"></p>
      </section>

      <main class="post-detail-main fade-in" id="protected-content" hidden>
        <article class="post-detail-body">
          <p>
             

            
          </p>
        </article>
        <footer class="post-detail-engagement" aria-label="Reactions and comments">
          <div class="post-detail-likes">
            <button
              type="button"
              class="post-detail-like-btn"
              id="post-like-btn"
              aria-label="Like this post"
              aria-pressed="false"
            >
              <span class="post-detail-likes-icon" aria-hidden="true">♥</span>
              <span class="post-detail-likes-count" id="post-likes-count">0</span>
            </button>
            <span class="post-detail-likes-note">likes</span>
          </div>
          <section class="post-detail-comments">
            <h2 class="post-detail-comments-heading">Comments</h2>
            <form class="post-detail-comment-form" id="post-comment-form">
              <label for="post-comment-input" class="visually-hidden">Add a comment</label>
              <textarea
                id="post-comment-input"
                name="comment"
                rows="3"
                maxlength="2000"
                placeholder="Write a comment…"
                required
              ></textarea>
              <button type="submit">Post comment</button>
            </form>
            <ul class="post-detail-comment-list" id="post-comment-list" aria-live="polite"></ul>
            <p class="post-detail-comments-empty" id="post-comment-empty">No comments yet.</p>
          </section>
        </footer>
      </main>
    </div>

    <script>
      (function () {
        var body = document.body;
        var toggle = document.getElementById('theme-toggle');
        if (!toggle) return;

        var favicon = document.getElementById('site-favicon');

        function setFavicon() {
          if (!favicon) return;
          favicon.setAttribute('href', '../assets/favicon.png');
        }

        function applyTheme(theme) {
          var isDark = theme === 'dark';
          body.classList.toggle('theme-dark', isDark);
          var root = document.documentElement;
          root.classList.toggle('theme-dark', isDark);
          setFavicon();
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        var stored = localStorage.getItem('theme');
        if (stored === 'dark') {
          applyTheme('dark');
        } else {
          applyTheme('light');
        }

        toggle.addEventListener('click', function () {
          var next = body.classList.contains('theme-dark') ? 'light' : 'dark';
          applyTheme(next);
        });
      })();
    </script>
    <script>
      (function () {
        var gate = document.getElementById('passcode-gate');
        var form = document.getElementById('passcode-gate-form');
        var input = document.getElementById('passcode-input');
        var error = document.getElementById('passcode-gate-error');
        var content = document.getElementById('protected-content');
        if (!gate || !form || !input || !error || !content) return;

        // SHA-256 hash for current passcode ("ruben-only").
        var PASSCODE_HASH = 'bda5459a0e2644a21da04c7aa147f30b2849ac296c7e92b69002f4172e0da20f';
        var STORAGE_KEY = 'egodataUnlocked:v1';

        function toHex(buffer) {
          var bytes = new Uint8Array(buffer);
          var hex = '';
          for (var i = 0; i < bytes.length; i++) {
            hex += bytes[i].toString(16).padStart(2, '0');
          }
          return hex;
        }

        function unlock() {
          sessionStorage.setItem(STORAGE_KEY, '1');
          gate.hidden = true;
          content.hidden = false;
        }

        if (sessionStorage.getItem(STORAGE_KEY) === '1') {
          unlock();
          return;
        }

        form.addEventListener('submit', function (event) {
          event.preventDefault();
          var value = (input.value || '').trim();
          if (!value) return;
          error.textContent = '';

          crypto.subtle
            .digest('SHA-256', new TextEncoder().encode(value))
            .then(function (digest) {
              if (toHex(digest) === PASSCODE_HASH) {
                unlock();
                return;
              }
              error.textContent = 'Incorrect passcode';
              input.select();
            })
            .catch(function () {
              error.textContent = 'Could not validate passcode in this browser.';
            });
        });
      })();
    </script>
    <script src="../assets/post-interactions.js" defer></script>
  </body>
</html>
